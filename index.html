<!DOCTYPE html>
<html>
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <title>UMT - Sialkot | Learning Management System</title>
    <style>
        body {
            background-image: url("umt.png");
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .loginbox {
            background-color: white;
            padding: 30px;
            border-radius: 4px;
            width: 350px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .inputbox {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            background-color: #f1f5f9;
            box-sizing: border-box; 
        }
        .btnbox {
            width: 100%;
            padding: 12px;
            background-color: #1a8fa8;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        .toplogobox {
            width: 160px;
            margin-bottom: 20px;
        }
        .linkbox {
            font-size: 13px;
            margin-top: 15px;
        }
        .linkcolor {
            color: #1a8fa8; text-decoration: none;
        }
    </style>
</head>
<body>

    <img src="logo.png" class="toplogobox">

    <div class="loginbox">
        <h3>Already have an account?</h3>
        
        <form>
            <input type="text" placeholder="Username" class="inputbox">
            <input type="password" placeholder="Password" class="inputbox">
            
            <div style="margin: 10px 0; font-size: 14px;">
                <input type="checkbox"> Remember username
            </div>

            <button type="button" class="btnbox">Log in</button>
        </form>

        <p class="linkbox">
            <a href="#" class ="linkcolor">Forgotten your username or password?</a>
        </p>
    </div>

</body>
</html>
